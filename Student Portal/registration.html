<!DOCTYPE html>
<html>
<head>
<title>Registration</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand">Student Portal</a>
</div>
</nav>

<div class="container">
<div class="container-box">
<h2>Student Registration</h2>

<form name="form" onsubmit="return validateForm()">

<input type="text" name="name" class="form-control mb-3" placeholder="Full Name">
<input type="email" name="email" class="form-control mb-3" placeholder="Email">

<input type="password" name="password" class="form-control mb-3" placeholder="Password">
<input type="password" name="confirm" class="form-control mb-3" placeholder="Confirm Password">

<input type="number" name="age" class="form-control mb-3" placeholder="Age">

<select class="form-control mb-3">
<option>Male</option>
<option>Female</option>
</select>

<button type="submit" class="btn btn-primary">Register</button>

</form>
</div>
</div>

<script>
function validateForm() {
let email = document.forms["form"]["email"].value;
let password = document.forms["form"]["password"].value;
let confirm = document.forms["form"]["confirm"].value;

if (email == "" || password == "") {
alert("All fields required");
return false;
}

if (!email.includes("@")) {
alert("Invalid email");
return false;
}

if (password != confirm) {
alert("Passwords do not match");
return false;
}

window.location.href = "dashboard.html";
return false;
}
</script>

</body>
</html>
